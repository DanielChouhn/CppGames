<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++小游戏大全 · 由Daniel_Chou_hn创立的C++小游戏社群</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ---------- 重置 & 基础 ---------- */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #0b121f; min-height: 100vh; padding: 2rem 1.5rem; display: flex; justify-content: center; }
    .app { max-width: 1300px; width: 100%; }

    /* ---------- 头部 ---------- */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 2.2rem; font-weight: 700; color: #e6f0ff; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.5rem; text-shadow: 0 2px 10px rgba(0, 160, 255, 0.15); }
    .header h1 span { background: linear-gradient(135deg, #66d0ff, #2a7fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header h3 { font-weight: 400; font-size: 0.95rem; color: #7f9bc0; background: rgba(255,255,255,0.04); padding: 0.3rem 1.2rem; border-radius: 40px; border: 1px solid rgba(255,255,255,0.06); letter-spacing: 0.3px; backdrop-filter: blur(4px); }

    /* ---------- 认证区 ---------- */
    .auth-area { display: flex; gap: 0.6rem; align-items: center; }
    .auth-area button { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); padding: 0.5rem 1.4rem; border-radius: 60px; font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: 0.25s; color: #c8dcf5; backdrop-filter: blur(4px); }
    .auth-area button:hover { background: rgba(42, 127, 255, 0.15); border-color: rgba(42, 127, 255, 0.3); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 80, 200, 0.15); }
    .auth-area .user-badge { background: rgba(255,255,255,0.04); backdrop-filter: blur(4px); border-radius: 60px; padding: 0.25rem 1rem 0.25rem 1.8rem; display: flex; align-items: center; gap: 0.9rem; border: 1px solid rgba(255,255,255,0.06); }
    .auth-area .user-badge span { font-weight: 600; color: #e6f0ff; }
    .auth-area .user-badge button { background: transparent; border: none; color: #7f9bc0; cursor: pointer; font-size: 0.85rem; padding: 0.2rem 0.6rem; border-radius: 40px; transition: 0.15s; }
    .auth-area .user-badge button:hover { background: rgba(255,255,255,0.06); color: white; }

    /* ---------- 三栏布局（新增公告栏） ---------- */
    .dashboard { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; }
    @media (max-width: 780px) { .dashboard { grid-template-columns: 1fr; } }

    /* ---------- 公告栏 ---------- */
    .announcement-section {
      background: rgba(18, 30, 50, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 1.8rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6);
      margin-bottom: 2rem;
      grid-column: 1 / -1;
    }
    .announcement-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .announcement-header h2 {
      font-weight: 600;
      font-size: 1.2rem;
      color: #e6f0ff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .announcement-header .badge {
      background: rgba(255, 215, 100, 0.15);
      color: #f5d78a;
      font-size: 0.65rem;
      padding: 0.15rem 0.8rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 215, 100, 0.15);
      font-weight: 500;
    }
    .announcement-content {
      background: rgba(255,255,255,0.02);
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.04);
      color: #c8dcf5;
      font-size: 0.95rem;
      line-height: 1.8;
      min-height: 60px;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .announcement-content .empty {
      color: #7f9bc0;
      font-style: italic;
    }
    .announcement-content a {
      color: #66d0ff;
      text-decoration: none;
      border-bottom: 1px dashed rgba(102, 208, 255, 0.3);
    }
    .announcement-content a:hover {
      border-bottom-color: #66d0ff;
    }
    .announcement-content code {
      background: rgba(255,255,255,0.06);
      padding: 0.1rem 0.5rem;
      border-radius: 6px;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #b0cae5;
    }
    .announcement-content ul, .announcement-content ol {
      padding-left: 1.5rem;
      margin: 0.3rem 0;
    }
    .announcement-content h1, .announcement-content h2, .announcement-content h3 {
      color: #e6f0ff;
      margin: 0.5rem 0 0.2rem 0;
    }
    .announcement-refresh {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #7f9bc0;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .announcement-refresh:hover {
      background: rgba(255,255,255,0.08);
      color: #c8dcf5;
    }

    /* ---------- 游戏列表 ---------- */
    .game-list-section { background: rgba(18, 30, 50, 0.6); backdrop-filter: blur(8px); border-radius: 28px; padding: 1.8rem 1.8rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6); }
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.8rem; flex-wrap: wrap; gap: 0.8rem; }
    .list-header h2 { font-weight: 600; font-size: 1.5rem; color: #e6f0ff; letter-spacing: -0.3px; }
    .list-header-right { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .upload-trigger-btn { background: linear-gradient(135deg, #2a7fff, #1a5fcf); color: white; border: none; padding: 0.6rem 1.8rem; border-radius: 60px; font-weight: 500; font-size: 0.95rem; cursor: pointer; transition: 0.25s; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 6px 18px rgba(42, 127, 255, 0.25); }
    .upload-trigger-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 28px rgba(42, 127, 255, 0.35); }

    .game-item {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      padding: 1.4rem 1rem;
      transition: all 0.2s ease;
      cursor: pointer;
      border-radius: 12px;
      margin-bottom: 2px;
      position: relative;
    }
    .game-item:last-child { border-bottom: none; }
    .game-item:hover {
      background: rgba(255,255,255,0.03);
    }
    .game-item.selected {
      background: rgba(42, 127, 255, 0.12);
      border: 1px solid rgba(42, 127, 255, 0.25);
      box-shadow: 0 0 20px rgba(42, 127, 255, 0.08);
    }
    .game-item.selected .game-title {
      color: #66d0ff;
    }
    .game-item .select-indicator {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #2a7fff;
      font-size: 1.2rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .game-item.selected .select-indicator {
      opacity: 1;
    }
    .game-title { font-weight: 650; font-size: 1.25rem; color: #e6f0ff; letter-spacing: -0.2px; }
    .game-desc { color: #9bb5d8; font-size: 0.95rem; margin-top: 0.2rem; word-break: break-word; line-height: 1.5; }
    .game-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.7rem; font-size: 0.85rem; color: #7f9bc0; flex-wrap: wrap; gap: 0.5rem; }
    .game-meta .date { background: rgba(255,255,255,0.04); padding: 0.15rem 1rem; border-radius: 40px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.04); }
    .download-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); padding: 0.25rem 1.4rem; border-radius: 40px; font-weight: 500; color: #c8dcf5; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.4rem; }
    .download-btn:hover { background: rgba(42, 127, 255, 0.15); border-color: rgba(42, 127, 255, 0.3); color: white; transform: translateY(-1px); }

    /* ---------- 分页 ---------- */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 1.2rem 0 0.3rem 0;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.04);
      margin-top: 0.8rem;
    }
    .pagination button {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: #c8dcf5;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      font-weight: 500;
      min-width: 40px;
    }
    .pagination button:hover:not(:disabled) {
      background: rgba(42, 127, 255, 0.15);
      border-color: rgba(42, 127, 255, 0.3);
      color: white;
    }
    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .pagination button.active {
      background: linear-gradient(135deg, #2a7fff, #1a5fcf);
      border-color: #2a7fff;
      color: white;
      box-shadow: 0 4px 14px rgba(42, 127, 255, 0.25);
    }
    .pagination .page-info {
      color: #7f9bc0;
      font-size: 0.85rem;
      padding: 0 0.5rem;
    }

    /* ---------- 用户面板 ---------- */
    .user-panel { background: rgba(18, 30, 50, 0.6); backdrop-filter: blur(8px); border-radius: 28px; padding: 2rem 1.8rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 2rem; }
    .user-info-block { display: flex; flex-direction: column; gap: 0.6rem; }
    .user-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; }
    .username { font-size: 1.7rem; font-weight: 700; color: #e6f0ff; letter-spacing: -0.3px; }
    .honor-title { background: rgba(255, 215, 100, 0.12); color: #f5d78a; font-size: 0.7rem; padding: 0.2rem 0.9rem; border-radius: 40px; font-weight: 600; border: 1px solid rgba(255, 215, 100, 0.15); }
    .level-badge { background: linear-gradient(135deg, #2a7fff, #1a5fcf); color: white; border-radius: 40px; padding: 0.1rem 1rem; font-size: 0.75rem; font-weight: 600; border: none; }
    .exp-bar { margin-top: 0.4rem; background: rgba(255,255,255,0.06); height: 8px; border-radius: 20px; width: 100%; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
    .exp-fill { height: 100%; background: linear-gradient(90deg, #2a7fff, #66d0ff); width: 0%; transition: width 0.3s ease; border-radius: 20px; }
    .exp-label { font-size: 0.75rem; color: #7f9bc0; margin-top: 0.2rem; font-weight: 450; }

    .game-count-wrap { margin-top: 0.5rem; }
    .game-count-badge { background: rgba(255,255,255,0.04); padding: 0.3rem 1.2rem; border-radius: 40px; display: inline-block; font-size: 0.9rem; font-weight: 500; color: #c8dcf5; transition: 0.15s; cursor: default; border: 1px solid rgba(255,255,255,0.06); }
    .game-count-badge:hover { background: rgba(255,255,255,0.08); }

    .hover-game-list { background: rgba(10, 20, 35, 0.7); backdrop-filter: blur(8px); border-radius: 20px; padding: 0.6rem 1.2rem; margin-top: 0.5rem; max-height: 150px; overflow-y: auto; display: none; border: 1px solid rgba(255,255,255,0.06); }
    .hover-game-list.show { display: block; }
    .hover-game-list li { list-style: none; padding: 0.25rem 0; font-size: 0.9rem; color: #b0cae5; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .hover-game-list li:last-child { border-bottom: none; }

    .weekly-area { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1.8rem; margin-top: 0.2rem; }
    .weekly-title { font-weight: 600; color: #e6f0ff; margin-bottom: 0.8rem; font-size: 1rem; }
    .weekly-submit-btn { background: linear-gradient(135deg, #2a7fff, #1a5fcf); color: white; border: none; padding: 0.5rem 1.8rem; border-radius: 60px; font-weight: 500; cursor: pointer; transition: 0.25s; margin-bottom: 1rem; box-shadow: 0 6px 18px rgba(42, 127, 255, 0.2); width: 100%; }
    .weekly-submit-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    .weekly-submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(42, 127, 255, 0.3); }
    .submitted-list { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 0.6rem 1.2rem; font-size: 0.9rem; color: #b0cae5; max-height: 120px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.04); }
    .submitted-list div { padding: 0.25rem 0; border-bottom: 1px dashed rgba(255,255,255,0.04); }
    .submitted-list div:last-child { border-bottom: none; }

    /* ---------- 弹窗 (深色玻璃) ---------- */
    .auth-overlay, .upload-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); justify-content: center; align-items: center; z-index: 1000; }
    .auth-overlay.open, .upload-overlay.open { display: flex; }
    .auth-card, .upload-card { background: rgba(16, 28, 48, 0.85); backdrop-filter: blur(16px); padding: 2.4rem; border-radius: 32px; max-width: 420px; width: 90%; box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.06); }
    .auth-card h3, .upload-card h3 { margin-bottom: 1.8rem; font-weight: 700; text-align: center; font-size: 1.6rem; color: #e6f0ff; letter-spacing: -0.3px; }
    .auth-input { width: 100%; padding: 0.9rem 1.2rem; border: 1px solid rgba(255,255,255,0.06); border-radius: 60px; margin-bottom: 1.2rem; font-size: 0.95rem; background: rgba(255,255,255,0.04); color: #e6f0ff; transition: 0.2s; }
    .auth-input::placeholder { color: #5a7a9f; }
    .auth-input:focus { outline: none; border-color: #2a7fff; box-shadow: 0 0 0 4px rgba(42, 127, 255, 0.1); background: rgba(255,255,255,0.06); }
    .auth-actions { display: flex; gap: 0.8rem; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .auth-switch { font-size: 0.9rem; color: #7f9bc0; cursor: pointer; background: none; border: none; text-decoration: underline; font-weight: 500; transition: 0.15s; padding: 0.3rem 0.5rem; border-radius: 40px; }
    .auth-switch:hover { color: #c8dcf5; background: rgba(255,255,255,0.04); }
    .auth-btn { padding: 0.7rem 2rem; border-radius: 60px; border: none; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #2a7fff, #1a5fcf); color: white; flex: 1; transition: 0.25s; font-size: 0.95rem; box-shadow: 0 6px 18px rgba(42, 127, 255, 0.2); }
    .auth-btn:hover { transform: scale(1.02); box-shadow: 0 10px 28px rgba(42, 127, 255, 0.3); }
    .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .upload-card .file-name { background: rgba(255,255,255,0.04); padding: 0.6rem 1.2rem; border-radius: 60px; margin: 0.8rem 0; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.06); color: #b0cae5; }
    .upload-card textarea { width: 100%; padding: 0.8rem 1.2rem; border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; resize: vertical; font-family: inherit; margin: 0.5rem 0 1.2rem; background: rgba(255,255,255,0.04); color: #e6f0ff; transition: 0.2s; }
    .upload-card textarea::placeholder { color: #5a7a9f; }
    .upload-card textarea:focus { outline: none; border-color: #2a7fff; background: rgba(255,255,255,0.06); }
    .upload-card .actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
    .upload-card .actions button { padding: 0.5rem 1.8rem; border-radius: 60px; border: 1px solid rgba(255,255,255,0.06); font-weight: 500; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.04); color: #c8dcf5; }
    .btn-primary { background: linear-gradient(135deg, #2a7fff, #1a5fcf) !important; color: white !important; border: none !important; box-shadow: 0 6px 18px rgba(42, 127, 255, 0.2); }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 10px 28px rgba(42, 127, 255, 0.3); }
    .btn-secondary { background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.06) !important; }
    .btn-secondary:hover { background: rgba(255,255,255,0.08) !important; }

    .toast-message { position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%); background: rgba(10, 20, 35, 0.85); backdrop-filter: blur(12px); color: #e6f0ff; padding: 0.7rem 2rem; border-radius: 60px; font-size: 0.95rem; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 999; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); }
    .toast-message.show { opacity: 1; }
    .empty-state { color: #7f9bc0; padding: 1.5rem 0; font-style: italic; text-align: center; }
    .loading-spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .auth-cancel-wrap { margin-top: 0.6rem; text-align: center; }
    #authCancelBtn { background: none; border: none; color: #7f9bc0; cursor: pointer; font-size: 0.9rem; padding: 0.3rem 1rem; border-radius: 40px; transition: 0.15s; }
    #authCancelBtn:hover { background: rgba(255,255,255,0.04); color: #c8dcf5; }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(42, 127, 255, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(42, 127, 255, 0.5); }

    .selected-hint {
      color: #66d0ff;
      font-size: 0.85rem;
      background: rgba(42, 127, 255, 0.08);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      border: 1px solid rgba(42, 127, 255, 0.15);
    }

    /* 公告栏中的简单Markdown样式 */
    .announcement-content strong { color: #e6f0ff; }
    .announcement-content em { color: #9bb5d8; }
    .announcement-content blockquote {
      border-left: 3px solid #2a7fff;
      padding-left: 1rem;
      margin: 0.3rem 0;
      color: #7f9bc0;
    }
    .announcement-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>⚡ <span>C++小游戏大全</span></h1>
    <h3>luogu.com.cn/team/121453</h3>
    <div class="auth-area" id="authArea"></div>
  </header>

  <!-- ====== 公告栏 ====== -->
  <div class="announcement-section" id="announcementSection">
    <div class="announcement-header">
      <h2>📢 公告栏 <span class="badge">动态</span></h2>
      <button class="announcement-refresh" id="refreshAnnouncementBtn">⟳ 刷新</button>
    </div>
    <div class="announcement-content" id="announcementContent">
      <div class="empty">⏳ 加载公告中...</div>
    </div>
  </div>

  <div class="dashboard">
    <section class="game-list-section">
      <div class="list-header">
        <h2>📂 游戏库</h2>
        <div class="list-header-right">
          <span id="selectedHint" class="selected-hint" style="display:none;">✅ 已选中</span>
          <button class="upload-trigger-btn" id="openUploadBtn">＋ 上传游戏</button>
        </div>
      </div>
      <div id="gameListContainer"></div>
      <!-- ====== 分页组件 ====== -->
      <div class="pagination" id="paginationContainer">
        <button id="prevPageBtn" disabled>‹ 上一页</button>
        <span class="page-info" id="pageInfo">第 1 / 1 页</span>
        <button id="nextPageBtn" disabled>下一页 ›</button>
      </div>
    </section>
    <aside class="user-panel" id="userPanel"></aside>
  </div>
</div>

<!-- 登录/注册 弹窗 -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h3 id="authTitle">登录</h3>
    <input type="text" id="authUsername" class="auth-input" placeholder="用户名" autocomplete="off">
    <input type="password" id="authPassword" class="auth-input" placeholder="密码 (至少6位)">
    <div class="auth-actions">
      <button class="auth-switch" id="authSwitchBtn">没有账号？去注册</button>
      <button class="auth-btn" id="authConfirmBtn">登录</button>
    </div>
    <div class="auth-cancel-wrap"><button id="authCancelBtn">取消</button></div>
  </div>
</div>

<!-- 上传弹窗 -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-card">
    <h3>📤 上传 .cpp 游戏</h3>

    // ---------- 工具函数 ----------
    function showToast(msg, duration = 2800) {

    // 简单的 Markdown 渲染（支持常见语法）
    function renderMarkdown(text) {
      if (!text) return '<span class="empty">📭 暂无公告</span>';
      
      let html = text;
      
      // 标题
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      
      // 粗体
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 斜体
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // 行内代码
      html = html.replace(/`(.+?)`/g, '<code>$1</code>');
      
      // 链接
      html = html.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // 无序列表
      html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\s*)+/g, (match) => {
        return `<ul>${match}</ul>`;
      });
      
      // 有序列表
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\s*)+/g, (match) => {
        return `<ol>${match}</ol>`;
      });
      
      // 引用
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      
      // 分隔线
      html = html.replace(/^---$/gm, '<hr>');
      
      // 换行
      html = html.replace(/\n/g, '<br>');
      
      return html;
    }

    // ---------- 公告栏功能 ----------
    async function loadAnnouncement() {
      try {
        announcementContent.innerHTML = '<div class="empty">⏳ 加载公告中...</div>';
        
        // 从 storage bucket 'announcements' 中获取 announcement.md
        const { data, error } = await supabase.storage
          .from('announcements')
          .download('announcement.md');
        
        if (error) {
          // 如果文件不存在，显示默认消息
          if (error.message.includes('not found')) {
            announcementContent.innerHTML = '<span class="empty">📭 暂无公告，管理员可上传 announcement.md</span>';
            return;
          }
          throw error;
        }
        
        const text = await data.text();
        const rendered = renderMarkdown(text);
        announcementContent.innerHTML = rendered;
        
      } catch (err) {
        console.warn('加载公告失败:', err);
        announcementContent.innerHTML = '<span class="empty">⚠️ 公告加载失败，请稍后刷新</span>';
      }
    }

    // ---------- 认证相关 ----------
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {

        await syncUserProfile(currentUser.id);

    async function syncUserProfile(userId) {
      const { data, error } = await supabase
        .from('profiles')
        .select('username, honor, level, exp')
        .eq('id', userId)
        .maybeSingle();
      if (error) { console.warn('获取profile失败', error); return; }
      if (data) {
        currentUser.user_metadata = {
          ...currentUser.user_metadata,
          username: data.username || '玩家',
          honor: data.honor || '玩家',
          level: data.level || 1,
          exp: data.exp || 0,
        };
      } else {
        const fallbackUsername = currentUser.user_metadata?.username || '玩家';
        const { error: insertError } = await supabase
          .from('profiles')
          .insert([{ id: userId, username: fallbackUsername, honor: '玩家', level: 1, exp: 0 }]);
        if (insertError) console.warn('创建profile失败', insertError);
        currentUser.user_metadata = {
          ...currentUser.user_metadata,
          username: fallbackUsername,
          honor: '玩家',
          level: 1,
          exp: 0,
        };
      }
    }

    async function updateUserExp(userId, deltaExp = 100) {
      const { data, error } = await supabase
        .from('profiles')
        .select('exp, level')
        .eq('id', userId)
        .maybeSingle();
      if (error || !data) { showToast('更新经验失败'); return; }
      let newExp = data.exp + deltaExp;
      let newLevel = data.level;
      while (newExp >= 1000) { newExp -= 1000; newLevel += 1; }
      const { error: updateErr } = await supabase
        .from('profiles')
        .update({ exp: newExp, level: newLevel })
        .eq('id', userId);
      if (updateErr) { showToast('经验更新失败'); return; }
      currentUser.user_metadata.exp = newExp;
      currentUser.user_metadata.level = newLevel;
      renderUserPanel();
    }

    function renderAuthArea() {

        authArea.innerHTML = `

    // ---------- 游戏选择 ----------
    function selectGame(gameId) {
      selectedGameId = gameId;
      
      document.querySelectorAll('.game-item').forEach(item => {

    function updateWeeklySubmitBtn() {

      if (!currentUser) {

        showToast('请先登录');

        showToast('该游戏已投稿');

        .from('weekcompetition')
        .insert([
          {
            game_id: gameId,
            name: gameName,
            submitted_by: currentUser.id
          }

        .select()
        .single();

    // ---------- 游戏列表渲染（分页） ----------
    function renderGameList() {
      const totalGames = games.length;
      totalPages = Math.max(1, Math.ceil(totalGames / PAGE_SIZE));
      
      // 确保当前页在有效范围内
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, totalGames);
      const pageGames = games.slice(start, end);
      
      if (!games.length) {
        gameListContainer.innerHTML = `<div class="empty-state">✨ 暂无游戏，快来上传第一个吧</div>`;
        updatePagination();
        return;
      }
      
      let html = '';
      pageGames.forEach(g => {
        const date = g.created_at ? new Date(g.created_at).toLocaleDateString('zh-CN') : '未知';
        const isSelected = g.id === selectedGameId;
        html += `
          <div class="game-item ${isSelected ? 'selected' : ''}" data-game-id="${g.id}">
            <div class="game-title">${g.title || '未命名'}</div>
            <div class="game-desc">${g.description || '无介绍'}</div>
            <div class="game-meta">
              <span class="date">📅 ${date}</span>
              <button class="download-btn" data-id="${g.id}" data-url="${g.file_url || '#'}">⬇ 下载 (${g.download_count || 0})</button>
            </div>
            <span class="select-indicator">✅</span>
          </div>
        `;
      });
      gameListContainer.innerHTML = html;

      // 事件绑定
      document.querySelectorAll('.game-item').forEach(item => {
        item.addEventListener('click', function(e) {
          if (e.target.closest('.download-btn')) return;
          const gameId = this.dataset.gameId;
          if (selectedGameId === gameId) {
            clearSelection();
          } else {
            selectGame(gameId);
          }
        });
      });

      document.querySelectorAll('.download-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const url = btn.dataset.url;
          const id = btn.dataset.id;
          const gameItem = btn.closest('.game-item');
          const title = gameItem?.querySelector('.game-title')?.textContent || 'game.cpp';
          
          if (!url || url === '#') { 
            showToast('文件链接无效'); 
            return; 
          }
          
          try {
            const { data: gData } = await supabase
              .from('games')
              .select('download_count')
              .eq('id', id)
              .single();
            if (gData) {
              await supabase
                .from('games')
                .update({ download_count: (gData.download_count || 0) + 1 })
                .eq('id', id);
            }
          } catch (err) {
            console.warn('更新下载次数失败', err);
          }
          
          try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('网络响应失败');
            const blob = await response.blob();
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const fileName = title.endsWith('.cpp') ? title : title + '.cpp';
            a.href = downloadUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
            showToast('✅ 开始下载');
          } catch (error) {
            console.error('下载失败:', error);
            showToast('❌ 下载失败，请重试');
          }
        });
      });

      if (selectedGameId) {
        const selectedGame = games.find(g => g.id === selectedGameId);
        if (selectedGame) {
          selectedHint.textContent = `✅ 已选中: ${selectedGame.title || '未命名'}`;
          selectedHint.style.display = 'inline-block';
        } else {
          selectedHint.style.display = 'none';
        }
      } else {
        selectedHint.style.display = 'none';
      }

      updatePagination();
    }

    // ---------- 分页控制 ----------
    function updatePagination() {
      const total = games.length;
      const totalPagesCalc = Math.max(1, Math.ceil(total / PAGE_SIZE));
      totalPages = totalPagesCalc;
      
      pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页 (共 ${total} 个游戏)`;
      
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= totalPages;
    }

    function goToPage(page) {
      const total = games.length;
      const maxPage = Math.max(1, Math.ceil(total / PAGE_SIZE));
      const newPage = Math.max(1, Math.min(page, maxPage));
      if (newPage === currentPage) return;
      currentPage = newPage;
      renderGameList();
      // 滚动到列表顶部
      document.querySelector('.game-list-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ---------- 用户面板 ----------
    function renderUserPanel() {
      if (!currentUser) {
        userPanel.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:#7f9bc0;">
            <div style="font-size:3rem;margin-bottom:0.5rem;opacity:0.6;">🔒</div>
            <p>请登录以查看个人信息</p>
          </div>
        `;
        return;
      }
      const meta = currentUser.user_metadata || {};
      const username = meta.username || '无名玩家';
      const honor = meta.honor || '玩家';
      const level = meta.level || 1;
      const exp = meta.exp || 0;
      const expPercent = (exp / 1000) * 100;
      const totalGames = userGames.length;

      let hoverListHtml = '';
      if (userGames.length) {
        hoverListHtml = `<ul class="hover-game-list" id="hoverGameList">${userGames.map(g => `<li>${g.title}</li>`).join('')}</ul>`;
      } else {
        hoverListHtml = `<div class="hover-game-list" id="hoverGameList" style="display:block;color:#7f9bc0;text-align:center;padding:0.6rem;">暂无上传</div>`;
      }

      let submittedListHtml = '';
      if (weeklySubmissions.length) {
        submittedListHtml = weeklySubmissions.map(sub => 
          `<div>📝 ${sub.name} (${sub.created_at ? new Date(sub.created_at).toLocaleDateString('zh-CN') : '未知'})</div>`
        ).join('');
      } else {
        submittedListHtml = '<div style="color:#7f9bc0;">暂无投稿</div>';
      }

      userPanel.innerHTML = `
        <div class="user-info-block">
          <div class="user-row">
            <span class="username">${username}</span>
            <span class="honor-title">${honor}</span>
          </div>
          <div class="user-row">
            <span class="level-badge">Lv.${level}</span>
            <span style="font-size:0.9rem;color:#7f9bc0;">经验 ${exp}/1000</span>
          </div>
          <div class="exp-bar"><div class="exp-fill" style="width:${Math.min(expPercent, 100)}%;"></div></div>
          <div class="game-count-wrap">
            <span class="game-count-badge" id="gameCountBadge">📦 我上传的游戏 (${totalGames})</span>
            ${hoverListHtml}
          </div>
        </div>
        <div class="weekly-area">
          <div class="weekly-title">🏆 周赛投稿</div>
          <button class="weekly-submit-btn" id="weeklySubmitBtn">📮 请先选择一个游戏</button>
          <div class="submitted-list" id="submittedList">
            ${submittedListHtml}
          </div>
        </div>
      `;

      const badge = document.getElementById('gameCountBadge');
      const hoverList = document.getElementById('hoverGameList');
      if (badge && hoverList) {
        badge.addEventListener('mouseenter', () => hoverList.classList.add('show'));
        badge.addEventListener('mouseleave', () => hoverList.classList.remove('show'));
      }

      document.getElementById('weeklySubmitBtn')?.addEventListener('click', async () => {
        if (!currentUser) { showToast('请先登录'); return; }
        
        if (!selectedGameId) {
          showToast('请先在游戏列表中点击选中一个游戏');
          return;
        }
        
        const selectedGame = games.find(g => g.id === selectedGameId);
        if (!selectedGame) {
          showToast('选中的游戏不存在');
          return;
        }
        
        if (weeklySubmissions.some(sub => sub.game_id === selectedGameId)) {
          showToast('该游戏已投稿');
          return;
        }
        
        const success = await submitToWeekCompetition(selectedGameId, selectedGame.title);
        
        if (success) {
          await fetchWeeklySubmissions();
          updateWeeklySubmitBtn();
        }
      });

      const cached = localStorage.getItem(`weekly_${currentUser.id}`);
      if (cached && weeklySubmissions.length === 0) {
        try { 
          const parsed = JSON.parse(cached);
          if (parsed.length > 0) {
            weeklySubmissions = parsed;
          }
        } catch(e) { 
          weeklySubmissions = []; 
        }
      }
      
      updateWeeklySubmitBtn();
    }

    // ---------- 数据获取 ----------
    async function fetchGames() {
      const { data, error } = await supabase
        .from('games')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { showToast('获取游戏列表失败'); return; }
      games = data || [];
      // 重置到第一页
      currentPage = 1;
      renderGameList();
    }

    async function fetchUserGames() {
      if (!currentUser) { userGames = []; return; }
      const { data, error } = await supabase
        .from('games')
        .select('id, title')
        .eq('uploader_id', currentUser.id);
      if (error) { console.warn('获取用户游戏失败', error); userGames = []; return; }
      userGames = data || [];
      renderUserPanel();
    }

    // ---------- 弹窗控制 ----------
    function openAuthModal(isLoginMode) {
      isAuthLoginMode = isLoginMode;
      authTitle.textContent = isLoginMode ? '登录' : '注册';
      authConfirmBtn.textContent = isLoginMode ? '登录' : '注册';
      authSwitchBtn.textContent = isLoginMode ? '没有账号？去注册' : '已有账号？去登录';
      authUsername.value = '';
      authPassword.value = '';
      authOverlay.classList.add('open');
    }

    function closeAuthModal() { authOverlay.classList.remove('open'); }

    authCancelBtn.addEventListener('click', closeAuthModal);
    authOverlay.addEventListener('click', (e) => { if (e.target === authOverlay) closeAuthModal(); });
    authSwitchBtn.addEventListener('click', () => { openAuthModal(!isAuthLoginMode); });

    authConfirmBtn.addEventListener('click', async () => {
      const username = authUsername.value.trim();
      const password = authPassword.value.trim();
      if (!username) { showToast('请输入用户名'); return; }
      if (!password || password.length < 6) { showToast('密码至少需要6位'); return; }
      authConfirmBtn.disabled = true;
      authConfirmBtn.textContent = '处理中...';

      try {
        if (isAuthLoginMode) {
          const email = `${username}@mygame.com`;
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) { showToast('登录失败: ' + error.message); } 
          else { 
            showToast('🎉 登录成功!'); 
            closeAuthModal(); 
            await checkAuth(); 
            await fetchUserGames(); 
            await fetchGames();
            await fetchWeeklySubmissions();
          }
        } else {
          const { data: existingUser, error: checkError } = await supabase
            .from('profiles')
            .select('username')
            .eq('username', username)
            .maybeSingle();
          if (checkError) { showToast('验证用户名失败: ' + checkError.message); return; }
          if (existingUser) { showToast('❌ 用户名已被使用'); return; }

          const email = `${username}@mygame.com`;
          const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: { username: username }
            }
          });
          
          if (signUpError) { 
            showToast('注册失败: ' + signUpError.message); 
            return; 
          }
          
          if (signUpData.user) {
            const { error: profileError } = await supabase
              .from('profiles')
              .upsert([
                { 
                  id: signUpData.user.id, 
                  username: username, 
                  honor: '玩家', 
                  level: 1, 
                  exp: 0 
                }
              ], { onConflict: 'id' });
            
            if (profileError) { 
              showToast('⚠️ 账号创建成功，但保存用户名失败: ' + profileError.message);
              console.error('Profile插入失败:', profileError);
            }
            
            currentUser = signUpData.user;
            currentUser.user_metadata = {
              ...currentUser.user_metadata,
              username: username,
              honor: '玩家',
              level: 1,
              exp: 0
            };
            
            closeAuthModal();
            showToast('🎉 注册成功! 欢迎 ' + username);
            
            renderAuthArea();
            renderUserPanel();
            await fetchGames();
            await fetchUserGames();
            await fetchWeeklySubmissions();
          }
        }
      } catch (e) { 
        showToast('发生错误: ' + e.message); 
      } finally { 
        authConfirmBtn.disabled = false; 
        authConfirmBtn.textContent = isAuthLoginMode ? '登录' : '注册'; 
      }
    });

    // ---------- 上传功能 ----------
    async function handleUpload() {
      if (!currentUser) { showToast('请先登录'); return; }
      if (!selectedFile) { showToast('请选择 .cpp 文件'); return; }
      if (isUploading) return;
      const desc = gameDescInput.value.trim() || '无介绍';
      const originalFileName = selectedFile.name;
      const fileExtension = originalFileName.includes('.') ? originalFileName.substring(originalFileName.lastIndexOf('.')) : '.cpp';
      isUploading = true;
      confirmUploadBtn.disabled = true;
      confirmUploadBtn.innerHTML = '<span class="loading-spinner"></span>上传中...';

      try {
        const { data: insertedData, error: insertError } = await supabase
          .from('games')
          .insert([{ title: originalFileName, description: desc, file_url: '', download_count: 0, uploader_id: currentUser.id }])
          .select()
          .single();
        if (insertError) throw new Error('保存失败: ' + insertError.message);
        const gameId = insertedData.id;
        const storageFileName = `${gameId}${fileExtension}`;
        const filePath = `games/${storageFileName}`;
        const { error: uploadError } = await supabase.storage.from('games').upload(filePath, selectedFile, { cacheControl: '3600', upsert: false });
        if (uploadError) { await supabase.from('games').delete().eq('id', gameId); throw new Error('文件上传失败: ' + uploadError.message); }
        const { data: urlData } = supabase.storage.from('games').getPublicUrl(filePath);
        const fileUrl = urlData?.publicUrl || '';
        if (!fileUrl) { await supabase.from('games').delete().eq('id', gameId); await supabase.storage.from('games').remove([filePath]); throw new Error('获取链接失败'); }
        const { error: updateError } = await supabase.from('games').update({ file_url: fileUrl }).eq('id', gameId);
        if (updateError) { await supabase.from('games').delete().eq('id', gameId); await supabase.storage.from('games').remove([filePath]); throw new Error('更新链接失败: ' + updateError.message); }
        await updateUserExp(currentUser.id, 100);
        await fetchGames();
        await fetchUserGames();
        closeUploadModal();
        showToast('✅ 上传成功！经验 +100');
      } catch (error) { showToast('❌ ' + error.message); } 
      finally { isUploading = false; confirmUploadBtn.disabled = false; confirmUploadBtn.textContent = '确认上传'; }
    }

    function openUploadModal() {
      if (!currentUser) { showToast('请先登录再上传'); return; }
      uploadOverlay.classList.add('open');
      selectedFile = null;
      selectedFileNameEl.textContent = '未选择文件';
      gameDescInput.value = '';
      fileInput.value = '';
      confirmUploadBtn.disabled = false;
      confirmUploadBtn.textContent = '确认上传';
    }
    function closeUploadModal() { uploadOverlay.classList.remove('open'); isUploading = false; }

    document.getElementById('openUploadBtn')?.addEventListener('click', openUploadModal);
    document.getElementById('cancelUploadBtn')?.addEventListener('click', closeUploadModal);
    document.getElementById('confirmUploadBtn')?.addEventListener('click', handleUpload);
    document.getElementById('chooseFileBtn')?.addEventListener('click', () => fileInput.click());
    fileInput?.addEventListener('change', (e) => {
      if (e.target.files.length) { selectedFile = e.target.files[0]; selectedFileNameEl.textContent = selectedFile.name; } 
      else { selectedFile = null; selectedFileNameEl.textContent = '未选择文件'; }
    });
    uploadOverlay?.addEventListener('click', (e) => { if (e.target === uploadOverlay) closeUploadModal(); });

    // ---------- 分页事件绑定 ----------
    prevPageBtn.addEventListener('click', () => goToPage(currentPage - 1));
    nextPageBtn.addEventListener('click', () => goToPage(currentPage + 1));

    // ---------- 公告刷新 ----------
    refreshAnnouncementBtn.addEventListener('click', () => {
      loadAnnouncement();
      showToast('🔄 公告已刷新');
    });

    // ---------- 初始化 ----------
    async function init() {
      // 加载公告
      await loadAnnouncement();
      
      await checkAuth();
      await fetchGames();
      if (currentUser) {
        await fetchUserGames();
        await fetchWeeklySubmissions();
      }
      
      supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session?.user) {
          currentUser = session.user;
          syncUserProfile(currentUser.id).then(() => { 
            renderAuthArea(); 
            renderUserPanel(); 
            fetchUserGames(); 
            fetchGames();
            fetchWeeklySubmissions();
          });
        } else if (event === 'SIGNED_OUT') {
          currentUser = null; 
          userGames = []; 
          weeklySubmissions = []; 
          selectedGameId = null;
          renderAuthArea(); 
          renderUserPanel(); 
          fetchGames();
        }
      });
    }
    init();
  })();
</script>
</body>
